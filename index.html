<html><head>
    <meta name="google-site-verification" content="N4MvkfKAEh5Q2YmuWoBjNBQmX3sKq56XcRSfP8VU9jo">
    <title>SaharaClay</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <script id="pixel-chaty" async="true" src="https://cdn.chaty.app/pixel.js?id=YjQzJds8" style="z-index:999999;"></script>
  </head>
  <body>

    <!-- Iframe Wix -->
    <iframe src="https://saharaclayinfo.wixsite.com/saharaclay" style="position:fixed; top:-50px; left:0px; bottom:0px; right:0px; width:100%; height:108%; border:none; margin:0; padding:0; overflow:hidden; z-index:9;" sandbox="allow-storage-access-by-user-activation allow-scripts allow-same-origin"></iframe>

    <!-- Overlay -->
    <div id="cookie-overlay" style="
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 9998;
    "></div>

    <!-- Modal cookies -->
    <div id="cookie-banner" style="
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #ede3cc;
      border-radius: 16px;
      padding: 36px 40px 32px 40px;
      max-width: 600px;
      width: 90%;
      z-index: 9999;
      font-family: Georgia, serif;
      color: #2c2416;
      box-shadow: 0 4px 30px rgba(0,0,0,0.15);
    ">
      <!-- Botón X -->
      <button onclick="cerrarBanner()" style="
        position: absolute;
        top: 16px;
        right: 20px;
        background: none;
        border: none;
        font-size: 20px;
        cursor: pointer;
        color: #2c2416;
        line-height: 1;
      ">×</button>

      <!-- Título -->
      <h2 style="
        margin: 0 0 16px 0;
        font-size: 20px;
        font-weight: normal;
      ">We have some cookies</h2>

      <!-- Texto -->
      <p style="
        margin: 0 0 20px 0;
        font-size: 16px;
        line-height: 1.6;
      ">
        We use cookies to make this website work properly.
        Some are necessary for its operation, while others
        help us improve it and understand how it is used.
      </p>

      <!-- Enlace -->
      <a href="/privacy-policy" style="
        color: #2c2416;
        font-size: 16px;
        text-decoration: underline;
        display: block;
        margin-bottom: 32px;
      ">Privacy Policy</a>

      <!-- Botones -->
      <div style="
        display: flex;
        justify-content: flex-end;
        gap: 12px;
      ">
        <button onclick="rechazarCookies()" style="
          background: transparent;
          color: #2c2416;
          border: 1.5px solid #2c2416;
          padding: 12px 32px;
          border-radius: 50px;
          font-size: 16px;
          font-family: Georgia, serif;
          cursor: pointer;
        ">Decline</button>

        <button onclick="aceptarCookies()" style="
          background: #2c2416;
          color: #ede3cc;
          border: none;
          padding: 12px 32px;
          border-radius: 50px;
          font-size: 16px;
          font-family: Georgia, serif;
          cursor: pointer;
        ">Got it!</button>
      </div>
    </div>

  

  <script type="text/javascript">
    // Redirigir a móvil si pantalla pequeña
    if (screen.width <= 900) {
      document.location = "/mobile.html";
    }

    // Cookies: si ya eligió, ocultar banner
    if (localStorage.getItem('cookie_consent')) {
      document.getElementById('cookie-banner').style.display = 'none';
      document.getElementById('cookie-overlay').style.display = 'none';
    }

    function aceptarCookies() {
      localStorage.setItem('cookie_consent', 'accepted');
      ocultarBanner();
    }

    function rechazarCookies() {
      localStorage.setItem('cookie_consent', 'rejected');
      ocultarBanner();
    }

    function cerrarBanner() {
      ocultarBanner();
    }

    function ocultarBanner() {
      document.getElementById('cookie-banner').style.display = 'none';
      document.getElementById('cookie-overlay').style.display = 'none';
    }
  </script>
</body></html>
