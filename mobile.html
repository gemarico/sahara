<html>
<head>

<meta name="viewport" content="width=320, user-scalable=yes" id="wixMobileViewport">
<title>SaharaClay</title>

<link rel="icon" href="favicon.ico" type="image/x-icon">
<link rel="shortcut icon" href="favicon.ico" type="image/x-icon">

<script id="pixel-chaty" async="true" src="https://cdn.chaty.app/pixel.js?id=YjQzJds8"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cactus+Classical+Serif&display=swap');

/* Overlay (no bloquea interacción) */
#cookie-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.3);
  z-index: 9998;
  pointer-events: none;
}

/* Banner simple móvil */
#cookie-banner {
  position: fixed;
  bottom: 40%;
  left: 50%;
  transform: translateX(-50%);
  width: 90%;
  background: #f1e3c8;
  border-radius: 16px;
  padding: 16px;
  z-index: 9999;
  font-family: 'Cactus Classical Serif', serif;
  color: #393D32;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
}

/* Texto */
#cookie-banner h2 {
  font-size: 14px;
  margin: 0 0 8px;
  font-weight: normal;
}

#cookie-banner p {
  font-size: 12px;
  margin-bottom: 12px;
}

/* Link */
#cookie-banner a {
  display: block;
  margin-bottom: 12px;
  text-decoration: underline;
  color: #393D32;
   font-size: 8px;
}

/* Botones */
.cookie-buttons {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}

.cookie-btn {
  padding: 8px 14px;
  font-size: 12px;
  border-radius: 8px;
  cursor: pointer;
}

/* Decline */
.decline {
  background: transparent;
  border: 1px solid #393D32;
  color: #393D32;
}

/* Accept */
.accept {
  background: #393D32;
  color: #f1e3c8;
  border: none;
}

/* Cerrar */
.close-btn {
  position: absolute;
  top: 6px;
  right: 10px;
  background: none;
  border: none;
  font-size: 14px;
  color: #393D32;
}
</style>

</head>

<body>

<!-- Iframe Wix -->
<iframe src="https://saharaclayinfo.wixsite.com/saharaclay"
style="position:fixed; top:-51px; left:0px; bottom:0px; right:0px; width:100%; height:110%; border:none; margin:0; padding:0; overflow:hidden; z-index:9;">
</iframe>

<!-- Overlay -->
<div id="cookie-overlay"></div>

<!-- Banner -->
<div id="cookie-banner">

<button class="close-btn" onclick="cerrarBanner()">×</button>

<h2>We have some cookies</h2>

<p>
We use cookies to make this website work properly.
</p>

<a href="/Privacy%20Policy.pdf" target="_blank">
  Privacy Policy
</a>

<div class="cookie-buttons">
  <button class="cookie-btn decline" onclick="rechazarCookies()">Decline</button>
  <button class="cookie-btn accept" onclick="aceptarCookies()">Got it!</button>
</div>

</div>

<script>
// Estado cookies
if (localStorage.getItem('cookie_consent')) {
  document.getElementById('cookie-banner').style.display = 'none';
  document.getElementById('cookie-overlay').style.display = 'none';
}

function aceptarCookies() {
  localStorage.setItem('cookie_consent', 'accepted');
  ocultarBanner();
}

function rechazarCookies() {
  localStorage.setItem('cookie_consent', 'rejected');
  ocultarBanner();
}

function cerrarBanner() {
  ocultarBanner();
}

function ocultarBanner() {
  document.getElementById('cookie-banner').style.display = 'none';
  document.getElementById('cookie-overlay').style.display = 'none';
}
</script>

</body>
</html>
